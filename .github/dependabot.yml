# Dependabot configuration — https://docs.github.com/code-security/dependabot
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      # vite is pinned to the 6.x line (bumped 5 -> 6.4.3 on 2026-06-17 to clear the
      # dev-server security advisories). vite 7/8 require Node ^20.19 || >=22.12 and we
      # run Node 20.18.0; vite 8 additionally defaults to rolldown, which drops the
      # object-form manualChunks in vite.config.js. Both are dev-time only (not shipped
      # in the PWA bundle). Revisit vite 7+ deliberately once Node is raised.
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      # esbuild is transitive via vite. Forcing esbuild >=0.28 via overrides regresses
      # the build (destructuring transform to the legacy browser target). Let vite pin it.
      - dependency-name: "esbuild"
        update-types: ["version-update:semver-major"]
      # puppeteer 25.x requires Node >=22.12.0; we run Node 20.18.0. Stay on 24.x (Node >=18)
      # until the project moves to Node 22+. devDep used only by the render-smoke gate.
      - dependency-name: "puppeteer"
        update-types: ["version-update:semver-major"]
      # tailwindcss 4 is a ground-up rewrite (CSS-first config, @tailwindcss/postcss split,
      # new content/theme model). It would require a deliberate migration of index.css +
      # tailwind.config + postcss pipeline. Stay on 3.x; revisit as a dedicated migration.
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      # lucide-react 0.x -> 1.x is a major with possible icon renames/removals that the
      # render-smoke can't fully catch. react 19 already works with 0.468 (peer ^19), so
      # there is no forcing reason. Take it deliberately later with an icon-import audit.
      - dependency-name: "lucide-react"
        update-types: ["version-update:semver-major"]
      # @vitejs/plugin-react 6.x requires vite ^8 as a peer, which conflicts with our
      # pinned vite 6.x -> `npm install` fails with ERESOLVE and the Vercel build dies
      # (happened on the 4.7.0 -> 6.0.2 PR #21). Stay on 4.x (peer vite ^4||^5||^6)
      # until vite is intentionally raised to 7/8.
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
  # Keep the GitHub Actions in .github/workflows pinned-but-current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
