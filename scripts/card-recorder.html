 neural(){const g=new THREE.Group();scene.add(g);const N=30,pts=fib(N,4,2.2,2.3).map(v=>v.add(new THREE.Vector3((rnd()-.5)*1.1,(rnd()-.5)*1.1,(rnd()-.5)*1.1)));const nodes=new THREE.InstancedMesh(new THREE.SphereGeometry(0.12,14,14),new THREE.MeshStandardMaterial({color:HEX,emissive:HEX,emissiveIntensity:1.1,roughness:0.35,metalness:0.4}),N),o=new THREE.Object3D();for(let i=0;i<N;i++){o.position.copy(pts[i]);o.scale.setScalar(0.5+rnd());o.updateMatrix();nodes.setMatrixAt(i,o.matrix)}nodes.instanceMatrix.needsUpdate=true;g.add(nodes);const pairs=[],lp=[];for(let i=0;i<N;i++){const d=[];for(let j=0;j<N;j++)if(j!==i)d.push([j,pts[i].distanceTo(pts[j])]);d.sort((a,b)=>a[1]-b[1]);for(let k=0;k<3;k++)if(d[k]&&i<d[k][0]){pairs.push([pts[i],pts[d[k][0]]]);lp.push(pts[i].x,pts[i].y,pts[i].z,pts[d[k][0]].x,pts[d[k][0]].y,pts[d[k][0]].z)}}const lg=new THREE.BufferGeometry();lg.setAttribute('position',new THREE.Float32BufferAttribute(lp,3));g.add(new THREE.LineSegments(lg,new THREE.LineBasicMaterial({color:HEX,transparent:true,opacity:0.3,blending:THREE.AdditiveBlending,depthWrite:false})));const pu=[],pm=new THREE.MeshBasicMaterial({color:0xffffff});for(let k=0;k<9;k++){const m=new THREE.Mesh(new THREE.SphereGeometry(0.1,8,8),pm);m.userData={s:Math.floor(rnd()*pairs.length),ph:rnd()};g.add(m);pu.push(m)}return t=>{const u=t/L;g.rotation.y=u*TAU;g.rotation.x=Math.sin(u*TAU)*0.1;pu.forEach(m=>{const s=pairs[m.userData.s%pairs.length];if(s){const f=(m.userData.ph+u*3)%1;m.position.lerpVectors(s[0],s[1],f)}})}},
 plasma(){const g=new THREE.Group();scene.add(g);const mat=new THREE.ShaderMaterial({uniforms:{uColor:{value:col},uColor2:{value:new THREE.Color(0xffffff)},uPhase:{value:0}},transparent:true,vertexShader:SNOISE+`uniform float uPhase;varying vec3 vN;varying vec3 vP;varying float vNoise;void main(){vec3 off=vec3(cos(uPhase),sin(uPhase),0.0);float n=snoise(normal*1.8+off*0.7)*0.5+snoise(normal*4.0+off*1.3)*0.25;vNoise=n;vec3 p=position+normal*n*0.45;vN=normalize(normalMatrix*normal);vec4 mv=modelViewMatrix*vec4(p,1.0);vP=mv.xyz;gl_Position=projectionMatrix*mv;}`,fragmentShader:`uniform vec3 uColor;uniform vec3 uColor2;varying vec3 vN;varying vec3 vP;varying float vNoise;void main(){vec3 v=normalize(-vP);float fres=pow(1.0-max(dot(vN,v),0.0),2.0);vec3 base=mix(uColor*0.55,uColor2,smoothstep(-0.1,0.5,vNoise)*0.7);gl_FragColor=vec4(base*(0.55+vNoise*0.7)+vec3(fres*1.1),0.93);}`});g.add(new THREE.Mesh(new THREE.SphereGeometry(1.15,80,80),mat));const shells=[];for(let s=0;s<3;s++){const sh=new THREE.Mesh(new THREE.IcosahedronGeometry(1.6+s*0.4,1),new THREE.MeshBasicMaterial({color:HEX,wireframe:true,transparent:true,opacity:0.2-s*0.05,blending:THREE.AdditiveBlending}));sh.userData={turns:(s+1)*(s%2?-1:1)};g.add(sh);shells.push(sh)}const an=400,ap=new Float32Array(an*3);for(let i=0;i<an;i++){const v=new THREE.Vector3().random().subScalar(0.5).normalize().multiplyScalar(1.7+rnd()*1.3);ap.set([v.x,v.y,v.z],i*3)}const ag=new THREE.BufferGeometry();ag.setAttribute('position',new THREE.Float32BufferAttribute(ap,3));g.add(new THREE.Points(ag,new THREE.PointsMaterial({color:HEX,size:0.05,transparent:true,opacity:0.6,blending:THREE.AdditiveBlending,depthWrite:false})));return t=>{const u=t/L;mat.uniforms.uPhase.value=u*TAU;g.rotation.y=u*TAU;shells.forEach(sh=>{sh.rotation.y=u*TAU*sh.userData.turns;sh.rotation.x=u*TAU*sh.userData.turns*0.5})}},
 molecule(){const pm=new THREE.PMREMGenerator(renderer);scene.environment=pm.fromScene(new RoomEnvironment(),0.04).texture;const g=new THREE.Group();scene.add(g);const A=34,pts=fib(A,2.3,2.3,2.3);const glass=new THREE.MeshPhysicalMaterial({color:0xffffff,roughness:0.08,metalness:0.5,clearcoat:1,clearcoatRoughness:0.1,iridescence:0.85,iridescenceIOR:1.4,envMapIntensity:1.7});const at=new THREE.InstancedMesh(new THREE.SphereGeometry(0.2,18,18),glass,A),o=new THREE.Object3D();for(let i=0;i<A;i++){o.position.copy(pts[i]);o.scale.setScalar(0.85+rnd()*0.4);o.updateMatrix();at.setMatrixAt(i,o.matrix)}at.instanceMatrix.needsUpdate=true;g.add(at);const bm=new THREE.MeshStandardMaterial({color:HEX,emissive:HEX,emissiveIntensity:0.7,roughness:0.4,transparent:true,opacity:0.8,blending:THREE.AdditiveBlending});const up=new THREE.Vector3(0,1,0),q2=new THREE.Quaternion(),seen=new Set();for(let i=0;i<A;i++){const d=[];for(let j=0;j<A;j++)if(j!==i)d.push([j,pts[i].distanceTo(pts[j])]);d.sort((a,b)=>a[1]-b[1]);for(let k=0;k<3;k++){const j=d[k][0],key=Math.min(i,j)+'-'+Math.max(i,j);if(seen.has(key))continue;seen.add(key);const dir=pts[j].clone().sub(pts[i]),len=dir.length();dir.normalize();const b=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,len,8),bm);q2.setFromUnitVectors(up,dir);b.quaternion.copy(q2);b.position.copy(pts[i].clone().add(pts[j]).multiplyScalar(0.5));g.add(b)}}g.add(halo(HEX,0.85,0.22));const ring=new THREE.Group();g.add(ring);const em=new THREE.MeshBasicMaterial({color:HEX}),els=[];for(let i=0;i<12;i++){const m=new THREE.Mesh(new THREE.SphereGeometry(0.06,8,8),em);m.userData={ph:i/12,r:2.7,tilt:i<6?0.3:1.3};ring.add(m);els.push(m)}return t=>{const u=t/L;g.rotation.y=u*TAU;g.rotation.x=0.25+Math.sin(u*TAU)*0.15;els.forEach(m=>{const a=(m.userData.ph+u*2)*TAU;m.position.set(Math.cos(a)*m.userData.r,Math.sin(a)*m.userData.r*Math.cos(m.userData.tilt),Math.sin(a)*m.userData.r*Math.sin(m.userData.tilt))})}},

 atom(){const g=new THREE.Group();scene.add(g);const nm=new THREE.MeshStandardMaterial({color:HEX,emissive:HEX,emissiveIntensity:1.0,roughness:0.3,metalness:0.5});for(let i=0;i<5;i++){const m=new THREE.Mesh(new THREE.SphereGeometry(0.28,16,16),nm);m.position.copy(new THREE.Vector3().random().subScalar(0.5).normalize().multiplyScalar(0.25));g.add(m)}g.add(halo(HEX,0.7,0.3));const rings=new THREE.Group();g.add(rings);const rm=new THREE.MeshBasicMaterial({color:HEX,transparent:true,opacity:0.5,blending:THREE.AdditiveBlending}),em=new THREE.MeshBasicMaterial({color:0xffffff}),els=[];const orient=[[0,0],[Math.PI/2.3,0.4],[-Math.PI/2.6,1.1]];orient.forEach((or,k)=>{const ring=new THREE.Mesh(new THREE.TorusGeometry(2+k*0.15,0.015,8,80),rm);ring.rotation.set(or[0],or[1],0);rings.add(ring);const e=new THREE.Mesh(new THREE.SphereGeometry(0.12,10,10),em);e.userData={ring:k,ph:k/3,or};rings.add(e);els.push(e)});return t=>{const u=t/L;rings.rotation.y=u*TAU;els.forEach(e=>{const Rr=2+e.userData.ring*0.15,a=(e.userData.ph+u*2)*TAU;const v=new THREE.Vector3(Math.cos(a)*Rr,Math.sin(a)*Rr,0);v.applyEuler(new THREE.Euler(e.userData.or[0],e.userData.or[1],0));e.position.copy(v)})}},
 fiber(){const g=new THREE.Group();scene.add(g);const bundle=new THREE.Group();g.add(bundle);const N=10,mat=new THREE.MeshStandardMaterial({color:HEX,emissive:HEX,emissiveIntensity:0.5,roughness:0.35,metalness:0.5}),place=[];for(let i=0;i<N;i++){const ang=(i/N)*TAU,rad=0.35+(i%3)*0.16,py=Math.sin(ang)*rad,pz=Math.cos(ang)*rad;place.push({py,pz});const pts=[];for(let s=0;s<=10;s++){const x=-2.7+(s/10)*5.4;pts.push(new THREE.Vector3(x,py+Math.sin(s*0.6+i)*0.05,pz+Math.cos(s*0.6+i)*0.05))}bundle.add(new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts),50,0.06+(i%2)*0.02,8,false),mat))}g.add(halo(HEX,1.5,0.10));const pm=new THREE.MeshBasicMaterial({color:0xffffff}),imps=[];for(let k=0;k<7;k++){const im=new THREE.Mesh(new THREE.SphereGeometry(0.055,8,8),pm);im.userData={fi:k%N,ph:rnd()};g.add(im);imps.push(im)}g.rotation.z=0.06;return t=>{const u=t/L;g.rotation.y=Math.sin(u*TAU)*0.3;const flex=1+Math.sin(u*TAU*2)*0.10;bundle.scale.set(1,flex,flex);imps.forEach(im=>{const f=(im.userData.ph+u)%1,x=-2.7+f*5.4,p=place[im.userData.fi];im.position.set(x,p.py*flex,p.pz*flex)})}},

}
const upd=(M[MOTIF]||M.neural)()

// warm up a few frames (PMREM / first compile) before recording
let warm=0
function warmLoop(){ upd(0); renderer.render(scene,cam); if(++warm<8){requestAnimationFrame(warmLoop)} else start() }
warmLoop()

// Deterministic offline encode: render frame n, hand it to a WebCodecs VideoEncoder
// at a fixed 30fps timestamp, mux to webm. Wall-clock render speed no longer
// affects the result, so heavy scenes stay a smooth 30fps (the old realtime
// MediaRecorder dropped them to ~17-22fps). Exactly SECS*30 frames = one seamless
// loop period.
async function start(){
  const FPS=30, total=Math.round(SECS*FPS)
  let muxer, encoder, nChunks=0
  try{
    muxer=new Muxer({ target:new ArrayBufferTarget(), video:{ codec:'V_VP9', width:W, height:H, frameRate:FPS } })
    encoder=new VideoEncoder({
      output:(chunk,meta)=>{ nChunks++; muxer.addVideoChunk(chunk,meta) },
      error:e=>{ window.__err='encoder: '+e; console.error(e) },
    })
    encoder.configure({ codec:'vp09.00.40.08', width:W, height:H, bitrate:2200000, framerate:FPS, latencyMode:'quality' })
  }catch(e){ window.__err='setup: '+(e&&e.message||e); console.error(e); return }
  const drain=async(max)=>{ while(encoder.encodeQueueSize>max) await new Promise(r=>setTimeout(r,3)) }
  try{
    for(let n=0;n<total;n++){
      upd(n/FPS)
      renderer.render(scene,cam)
      const frame=new VideoFrame(canvas,{ timestamp:Math.round(n*1e6/FPS), duration:Math.round(1e6/FPS) })
      encoder.encode(frame,{ keyFrame:n%30===0 })
      frame.close()
      await drain(6)
    }
    await encoder.flush()
    muxer.finalize()
    window.__enc=total; window.__chunks=nChunks
    const blob=new Blob([muxer.target.buffer],{ type:'video/webm' })
    const fr=new FileReader(); fr.onload=()=>{ window.__webm=fr.result; window.__done=true }; fr.readAsDataURL(blob)
  }catch(e){ window.__err='encode-loop: '+(e&&e.message||e); console.error(e) }
}
